services:
  engine:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: mc-bot-player-engine:latest
    container_name: mcbot-engine
    restart: unless-stopped
    ports:
      - "8723:8723"
    volumes:
      - mcbot-data:/data
    environment:
      - PORT=8723
      # 引擎默认只绑 127.0.0.1（本地最小暴露面）；容器里必须绑 0.0.0.0，
      # 否则端口映射够不着（healthcheck 在容器内照样绿，外面 000——已踩坑）
      - ENGINE_HOST=0.0.0.0
      # 经 --env-file 注入（deploy-tencent.ps1 首次部署自动生成并持久化）；
      # 留空则引擎首次启动自动生成令牌（见容器日志 / 数据卷）
      - ENGINE_TOKEN=${ENGINE_TOKEN:-}
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:8723/health').then(r=>process.exit(r.status===200?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  mcbot-data:
