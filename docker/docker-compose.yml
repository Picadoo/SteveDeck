services:
  engine:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: stevedeck-engine:latest
    container_name: stevedeck-engine
    restart: unless-stopped
    ports:
      - "8723:8723"
      # 实时视角端口池（bot_viewer 每个机器人占一个，按需启动；默认 4 个 = 8800-8803）。
      # 若把 ENGINE_VIEWER_PORTS 调大，这里的映射区间要同步放宽到 8800~(8800+N-1)。
      - "8800-8803:8800-8803"
    volumes:
      - mcbot-data:/data
    environment:
      - PORT=8723
      # 引擎默认只绑 127.0.0.1（本地最小暴露面）；容器里必须绑 0.0.0.0，
      # 否则端口映射够不着（healthcheck 在容器内照样绿，外面 000——已踩坑）
      - ENGINE_HOST=0.0.0.0
      # 经 --env-file 注入（deploy-tencent.ps1 首次部署自动生成并持久化）；
      # 留空则引擎首次启动自动生成令牌（见容器日志 / 数据卷）
      - ENGINE_TOKEN=${ENGINE_TOKEN:-}
      # 公网/外部可达地址：连接串、二维码、网页直开地址都用它（容器网卡上只有内网 IP）
      - ENGINE_PUBLIC_HOST=${ENGINE_PUBLIC_HOST:-}
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:8723/health').then(r=>process.exit(r.status===200?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  mcbot-data:
