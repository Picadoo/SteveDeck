# 发布：打 v* 标签自动出 Windows 安装包（GitHub Release）+ Docker 引擎镜像（GHCR）
# 用法：git tag v0.1.0 && git push origin v0.1.0
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # 上传 Release 资产
  packages: write # 推送 GHCR 镜像

jobs:
  windows-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - name: 缓存 Rust 构建
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 构建 protocol + engine + ui
        run: pnpm build

      - name: 生成自包含引擎包（完整版，带 3D 视角）
        run: node apps/desktop/scripts/make-engine-bundle.mjs full

      - name: 构建桌面安装包（NSIS + MSI）
        run: pnpm -C apps/desktop tauri build

      - name: 上传到 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi
          generate_release_notes: true

  docker-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: 登录 GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 镜像元数据（latest + 版本号双标签）
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/mc-bot-player-engine
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: 构建并推送
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
