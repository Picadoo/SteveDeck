name: CI

on:
  push:
    branches: [main]
  pull_request:

# 2026-06-16 起 GitHub 强制所有 JS action 跑 Node24。能升主版本的都升了（checkout/setup-node/upload-artifact）；
# 仍是 Node20 的（pnpm/action-setup 等）用此开关提前切到 Node24——问题现在暴露，而不是死线当天。
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm --filter @mcbot/engine test

  engine-image:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v5
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: stevedeck-engine:ci

  # 桌面安装包不在 CI 构建：带「更新签名」的 Windows 包由 release.yml 在打 tag 时产出（需签名密钥）。
  # 放进 CI 会（1）每次 push 重复约 15min 构建（2）让 fork PR 因取不到签名密钥而必红、外部贡献者无法修。
  # 桌面若编译损坏会在发版（打 tag）时被 release 工作流拦住，不会漏发坏包。
