name: CI

on:
  push:
    branches: [main]
  pull_request:

# 2026-06-16 起 GitHub 强制所有 JS action 跑 Node24。能升主版本的都升了（checkout/setup-node/upload-artifact）；
# 仍是 Node20 的（pnpm/action-setup 等）用此开关提前切到 Node24——问题现在暴露，而不是死线当天。
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm --filter @mcbot/engine test

  engine-image:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v5
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: mc-bot-player-engine:ci

  desktop-windows:
    runs-on: windows-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      # tauri.conf 的 resources 引用 engine-bundle，必须先生成（完整版含 3D 视角资源）
      - run: node apps/desktop/scripts/make-engine-bundle.mjs full
      # engine-bundle 内部的 pnpm deploy --config.node-linker=hoisted 会重写工作区安装状态
      # （连 @tauri-apps/cli 都被卸掉 → 'tauri' is not recognized），重装一次恢复
      - run: pnpm install --frozen-lockfile
      - run: pnpm -C apps/desktop tauri build
      - uses: actions/upload-artifact@v5
        with:
          name: windows-installers
          path: |
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi
            apps/desktop/src-tauri/target/release/bundle/nsis/*-setup.exe
